version: "3.9"

services:
  db:
    image: mysql:8.0
    restart: always
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: Abeeutee@23
      MYSQL_DATABASE: quickstore
      MYSQL_USER: root
      MYSQL_PASSWORD: Abeeutee@23
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -ppassword || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  web:
    build: .
    container_name: quickstore
    command: >
      sh -c "uv run python manage.py migrate &&
             uv run python manage.py collectstatic --noinput &&
             uv run gunicorn QuickStore.wsgi:application --bind 0.0.0.0:8000"
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  mysql_data: